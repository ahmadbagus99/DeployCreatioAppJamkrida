services:
  postgres:
    image: postgres:16-alpine
    container_name: creatio-postgres
    restart: unless-stopped
    command: postgres -c max_connections=500 -c shared_buffers=256MB
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db-backup:/backups
      - ./db-backup/restore.sh:/docker-entrypoint-initdb.d/restore.sh:ro
    networks:
      - creatio-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: creatio-redis
    restart: unless-stopped
    command: redis-server --bind 0.0.0.0 --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    networks:
      - creatio-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: creatio-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - creatio-net

  creatio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NetCoreVersion: "8.0"
    container_name: creatio-app
    restart: unless-stopped
    ports:
      - "${CREATIO_PORT}:5000"
      - "${CREATIO_HTTPS_PORT}:5002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./creatio-app:/app
      - creatio-logs:/app/Logs
    networks:
      - creatio-net
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_RUNNING_IN_CONTAINER=true
      - TZ=Asia/Jakarta

volumes:
  postgres-data:
  redis-data:
  creatio-logs:

networks:
  creatio-net:
    driver: bridge